name: mri
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12 # antspyx 0.6.3 is not compatible with python 3.13 yet
  - pip
  - setuptools=82.0.1
  - wheel=0.46.3
  - pytest=9.0.3
  - seaborn=0.13.2
  - traits=7.1.0
  - dcm2niix=1.0.20250506
  - heudiconv=1.3.4

  - pip:
      - antspyx==0.6.3
      - atlasreader @ git+https://github.com/miykael/atlasreader.git@093fe0f360941a89bcc3e019ffbe54c57fc083e5 # to work with the latest version of nilearn
      - dipy==1.12.0
      - dcmstack==0.9.0
      - fury==0.12.0
      - ipykernel==6.31.0
      - ipython==9.12.0
      - jupyter==1.1.1
      - matplotlib==3.10.8
      - nibabel==5.4.2
      - nilearn==0.13.1
      - nipype==1.11.0
      - nipy==0.6.1
      - numpy==2.3.5
      - nxviz==0.7.6
      - pandas==3.0.2
      - plotly==6.7.0
      - pybids==0.22.0
      - python-louvain==0.16
      - requests==2.33.1
      - rsatoolbox==0.3.2
      - scikit-image==0.26.0
      - scikit-learn==1.8.0
      - scipy==1.15.3

# After installation, to ensure the ipykernel is properly installed and set up:
# conda activate mri
# python -m ipykernel install --user --name mri --display-name "Python (mri)"